<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathe Code Photo Feed</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header">
    <h1>Breathe Code Photo Feed</h1>
  </div>

  <div class="feed">

    <div class="post">
      <div class="post-header">
        <h2>My first photo</h2>
        <span>12/14</span>
      </div>
      <img
        src="https://images.dog.ceo/breeds/husky/n02110185_1469.jpg"
        alt="Puppy"
      />
      <div class="post-body">
        <p>
          This is my first photo of the feed. this is a multi line comment for
          testing purposes. I am learning to code with #BreatheCode
        </p>
      </div>
    </div>

    <div class="post">
      <div class="post-header">
        <h2>Some cute thing</h2>
        <span>12/17</span>
      </div>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=80"
        alt="Nature"
      />
      <div class="post-body">
        <p>
          The internet approves this cute thing... and so do I.
        </p>
      </div>
    </div>

  </div>
</body>
</html>
